<meta name="mobile-web-app-capable" content="yes">

<title>Controle de Gastos</title>
<style>
  :root{
    --violet:#111111; --violet-dark:#000000; --violet-soft:#f2f2f2;
    --ink:#111111; --muted:#6b7280; --faint:#9ca3af;
    --bg:#f5f5f5; --card:#ffffff; --line:#e5e7eb;
    --green:#059669; --green-soft:#e7f6ef;
    --rose:#e11d48; --rose-soft:#fdebef;
    --amber:#b45309; --amber-soft:#fdf2e0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding-bottom:env(safe-area-inset-bottom);
    font-size:15px; line-height:1.4;
  }
  .num{font-variant-numeric:tabular-nums;}
  .wrap{max-width:620px; margin:0 auto; padding:0 14px 90px;}

  header{padding:max(env(safe-area-inset-top),14px) 14px 12px; max-width:620px; margin:0 auto;}
  .title{font-size:22px; font-weight:800; display:flex; align-items:center; gap:8px; margin:0;}
  .sub{color:var(--muted); font-size:13px; margin:2px 0 0;}
  .reset{background:none; border:none; color:var(--faint); font-size:12px; padding:0;
    display:inline-flex; align-items:center; gap:4px; margin-top:8px;}
  .reset:active{color:var(--rose);}
  .topbar{display:flex; gap:14px; margin-top:8px;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:12px; overflow:hidden;}
  .card-h{font-size:14px; font-weight:700; color:var(--ink); margin:0 0 10px; display:flex; align-items:center; gap:6px;}

  .ynav{display:flex; align-items:center; justify-content:center; gap:14px; margin:8px 0 4px;}
  .ynav button{width:38px; height:38px; border-radius:11px; border:1px solid var(--line);
    background:var(--card); font-size:16px; color:var(--violet); line-height:1; font-weight:700;}
  .ynav button:active{background:var(--violet-soft);}
  .ynav h2{font-size:22px; font-weight:800; margin:0; min-width:90px; text-align:center; color:var(--violet);}
  .mnav{display:flex; align-items:center; justify-content:center; gap:10px; margin:2px 0 14px;}
  .mnav button{width:40px; height:40px; border-radius:12px; border:1px solid var(--line);
    background:var(--card); font-size:22px; color:var(--muted); line-height:1;}
  .mnav button:active{background:var(--violet-soft);}
  .mnav h2{font-size:18px; font-weight:700; margin:0; min-width:130px; text-align:center;}

  .stats{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;}
  .stat{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:11px 10px;}
  .stat .lbl{font-size:11px; color:var(--faint); font-weight:600; display:flex; align-items:center; gap:4px;}
  .stat .val{font-size:17px; font-weight:800; margin-top:3px;}
  .stat .sub{font-size:10px; color:var(--faint); margin-top:2px;}
  .stat .edit{float:right; background:none; border:none; color:#cbd2dd; font-size:13px; padding:0;}
  .stat .edit:active{color:var(--violet);}
  .stat input{width:100%; font-size:16px; font-weight:800; border:none; border-bottom:2px solid var(--violet);
    outline:none; padding:2px 0; background:none; color:var(--ink);}
  .green{color:var(--green);} .rose{color:var(--rose);} .invest{color:#0d9488;}

  .banner{border-radius:14px; padding:11px 14px; font-size:14px; font-weight:600; margin-bottom:14px;}
  .banner.ok{background:var(--green-soft); color:var(--green); border:1px solid #b9e7d2;}
  .banner.bad{background:var(--rose-soft); color:var(--rose); border:1px solid #f6c9d3;}

  .form-grid{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:8px;}
  .form-grid .full{grid-column:1 / -1;}
  .form-grid > *{min-width:0; max-width:100%;}
  input,select{font-family:inherit; font-size:15px; padding:11px 10px; border:1px solid var(--line);
    border-radius:11px; outline:none; background:var(--card); width:100%; max-width:100%;
    color:var(--ink); min-width:0; box-sizing:border-box;}
  input:focus,select:focus{border-color:var(--violet);}
  input[type="date"]{-webkit-appearance:none; appearance:none; line-height:normal;}
  @media(max-width:480px){
    .form-grid{grid-template-columns:minmax(0,1fr);}
    .form-grid .full{grid-column:1;}
  }
  .btn{background:var(--violet); color:#fff; border:none; border-radius:11px; padding:12px; font-size:15px;
    font-weight:600; width:100%;}
  .btn:active{background:var(--violet-dark);}
  .btn-ghost{background:var(--violet-soft); color:var(--muted); border:none; border-radius:11px; padding:12px;
    font-size:15px; font-weight:600; width:100%;}
  .btn-ghost:active{background:var(--line);}
  .hint{font-size:12px; color:var(--muted); margin:8px 0 0;}
  .hint b{color:var(--violet-dark);}

  .item{display:flex; align-items:center; gap:10px; padding:11px 0; border-top:1px solid var(--line);}
  .item:first-child{border-top:none;}
  .bar{width:5px; height:34px; border-radius:5px; flex:0 0 auto;}
  .item .info{min-width:0; flex:1;}
  .item .desc{font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .item .meta{font-size:12px; color:var(--faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .item .amt{font-size:14px; font-weight:700; white-space:nowrap;}
  .pill{font-size:11px; font-weight:600; padding:3px 8px; border-radius:999px; border:none; flex:0 0 auto;}
  .pill.paid{background:var(--green-soft); color:var(--green);}
  .pill.due{background:var(--amber-soft); color:var(--amber);}
  .pill.on{background:var(--violet-soft); color:var(--violet-dark);}
  .pill.soon{background:var(--amber-soft); color:var(--amber);}
  .pill.done{background:#ece7ea; color:#9a8d94;}
  .desc2{font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .meta2{font-size:12px; color:var(--faint);}
  .item.done-inst{opacity:.7;}
  .iconbtn{background:none; border:none; color:#cbd2dd; font-size:16px; padding:4px 2px; flex:0 0 auto;}
  .iconbtn.edit:active{color:var(--violet);}
  .iconbtn.del:active{color:var(--rose);}
  .empty{text-align:center; color:var(--faint); font-size:14px; padding:26px 0; border:1px dashed var(--line); border-radius:14px;}
  .list-count{font-size:12px; color:var(--faint); margin-bottom:8px;}
  .editbox{background:var(--violet-soft); border:1px solid var(--line); border-radius:14px; padding:12px; margin:8px 0;}

  .donut-wrap{display:flex; justify-content:center; margin:6px 0 14px;}
  .donut{width:140px; height:140px; border-radius:50%; position:relative;}
  .donut::after{content:""; position:absolute; inset:26px; background:var(--card); border-radius:50%;}
  .catrow{margin-bottom:9px;}
  .catrow .top{display:flex; justify-content:space-between; font-size:12px; margin-bottom:3px;}
  .catrow .top .nm{color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .catrow .top .vl{color:var(--faint); white-space:nowrap; padding-left:8px;}
  .track{height:6px; background:var(--violet-soft); border-radius:6px; overflow:hidden;}
  .track > div{height:100%; border-radius:6px;}
  .subtotal{display:flex; justify-content:space-between; font-weight:700; font-size:14px;
    border-top:1px solid var(--line); margin-top:12px; padding-top:12px;}

  .infobox{background:var(--violet-soft); border:1px solid var(--line); color:var(--violet); border-radius:14px;
    padding:11px 14px; font-size:13px; margin-bottom:12px;}

  .scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  table{border-collapse:collapse; font-size:12px; width:100%;}
  th,td{padding:7px 8px; white-space:nowrap;}
  th{color:var(--faint); font-weight:600; background:var(--violet-soft);}
  th.l,td.l{text-align:left; position:sticky; left:0; background:var(--card); z-index:1;}
  th.l{background:var(--violet-soft);}
  td.r{text-align:right; color:var(--muted);}
  td.r.z{color:#d6c5ce;}
  tfoot td{border-top:1px solid var(--line);}
  .tot-row td{background:var(--violet-soft); font-weight:800; color:var(--ink);}
  .tot-row td.l{background:var(--violet-soft);}

  nav.tabs{position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,.94);
    backdrop-filter:saturate(180%) blur(10px); border-top:1px solid var(--line);
    display:flex; padding:6px 8px calc(env(safe-area-inset-bottom) + 6px); z-index:50;}
  nav.tabs button{flex:1; background:none; border:none; padding:6px 0; color:var(--faint);
    font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:3px;}
  nav.tabs button .ic{font-size:19px; line-height:1;}
  nav.tabs button.active{color:var(--violet);}
  .footnote{text-align:center; color:var(--faint); font-size:11px; margin-top:18px;}

  /* ----- tela de login ----- */
  #authScreen{position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    padding:20px; background:#f5f5f5;}
  .auth-card{background:#ffffff; border:1px solid #e5e7eb; border-radius:20px; padding:26px 22px;
    width:100%; max-width:360px; box-shadow:0 8px 32px rgba(0,0,0,.10);}
  .auth-card .btn{background:#111111; color:#fff;}
  .auth-card .btn:active{background:#333333;}
  .auth-card input:focus{border-color:#111111;}
  .auth-switch a{color:#111111 !important;}
  .auth-forgot:hover,.auth-forgot:active{color:#111111 !important;}
  .auth-card h1{font-size:22px; font-weight:800; margin:0 0 2px; display:flex; gap:8px; align-items:center;}
  .auth-card p.sub{margin:0 0 18px;}
  .auth-card input{margin-bottom:10px;}
  .auth-msg{font-size:13px; margin:6px 0 0; min-height:18px;}
  .auth-msg.err{color:var(--rose);} .auth-msg.ok{color:var(--green);}
  .auth-switch{text-align:center; font-size:13px; color:var(--muted); margin-top:14px;}
  .auth-switch a{color:var(--violet-dark); font-weight:600; text-decoration:none;}
  .auth-forgot{display:block; text-align:center; color:var(--faint); font-size:13px; text-decoration:none; margin-top:12px;}
  .auth-forgot:hover,.auth-forgot:active{color:var(--violet-dark);}
  .otp-input{font-size:28px; font-weight:800; text-align:center; letter-spacing:.35em; padding:14px 6px; font-variant-numeric:tabular-nums;}
  .hidden{display:none !important;}

  /* ----- configurações / gear ----- */
  .header-row{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .settings-btn{background:none; border:1.5px solid var(--line); border-radius:11px;
    width:38px; height:38px; font-size:17px; color:var(--muted); flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; margin-top:2px;}
  .settings-btn:active{background:var(--violet-soft); color:var(--violet);}
  .settings-panel{position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.45);}
  .settings-sheet{position:absolute; bottom:0; left:0; right:0; background:#fff;
    border-radius:22px 22px 0 0; padding:0 18px calc(env(safe-area-inset-bottom)+20px);
    box-shadow:0 -4px 32px rgba(0,0,0,.15);}
  .settings-handle{width:36px; height:4px; background:#e5e7eb; border-radius:4px; margin:10px auto 18px;}
  .settings-title{font-size:16px; font-weight:800; color:#111; margin:0 0 18px;}
  .settings-lbl{font-size:11px; font-weight:700; color:#9ca3af; margin:0 0 10px;
    text-transform:uppercase; letter-spacing:.06em;}
  .theme-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:18px;}
  .theme-swatch{border:2px solid transparent; border-radius:12px; padding:8px 4px 7px;
    text-align:center; background:#f5f5f5; cursor:pointer; font-size:11px; font-weight:600;
    color:#6b7280; display:flex; flex-direction:column; align-items:center; gap:5px;}
  .theme-swatch .dot{width:26px; height:26px; border-radius:50%;}
  .theme-swatch.active{border-color:#111; color:#111; background:#fff;
    box-shadow:0 1px 6px rgba(0,0,0,.10);}
  .theme-swatch:active{opacity:.7;}
  .settings-divider{height:1px; background:#f3f4f6; margin:0 0 16px;}
  .settings-logout{width:100%; background:#111; color:#fff; border:none; border-radius:12px;
    padding:13px; font-size:15px; font-weight:700;}
  .settings-logout:active{background:#333;}
</style>
</head>
<body>

<!-- ================= TELA DE LOGIN ================= -->
<div id="authScreen">
  <div class="auth-card" id="authCard"></div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">
  <header>
    <div class="header-row">
      <div>
        <h1 class="title">💰 Controle de Gastos</h1>
        <p class="sub">Suas finanças pessoais, mês a mês.</p>
      </div>
      <button class="settings-btn" id="settingsBtn">⚙️</button>
    </div>

  <div class="wrap" id="viewRoot"></div>

  <nav class="tabs" id="tabs">
    <button data-view="mes" class="active"><span class="ic">📅</span>Mês</button>
    <button data-view="parcelas"><span class="ic">💳</span>Parcelas</button>
    <button data-view="anual"><span class="ic">📊</span>Anual</button>
    <button data-view="invest"><span class="ic">📈</span>Invest.</button>

</div>

<!-- ================= PAINEL DE CONFIGURACOES ================= -->
<div id="settingsPanel" class="settings-panel hidden">

    <p class="settings-lbl">Tema de cores</p>

    <div class="settings-divider"></div>
    <button class="settings-logout" id="logoutBtn">⎋ Sair da conta</button>

</div>

<!-- Cliente Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   CONFIGURE AQUI  (Supabase > Project Settings > API)
   ============================================================ */
const SUPABASE_URL  = "https://whoztpeljgoartbpfazw.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indob3p0cGVsamdvYXJ0YnBmYXp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjAxOTIsImV4cCI6MjA5ODIzNjE5Mn0.Zfaa6-If4Mml2_Z1WC5QkN8EcFS8ZIzwFKIS0QqKynE";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let currentUser = null;
let currentThemeKey = "mono";

/* ============================== Domínio ============================== */
const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const CATEGORIES = [
  {name:"🍔 Alimentação",color:"#F97316"},{name:"🚗 Transporte",color:"#0EA5E9"},
  {name:"🏠 Moradia",color:"#6D5AE6"},{name:"💊 Saúde",color:"#10B981"},
  {name:"💄 Beleza & Cuidados",color:"#EC4899"},{name:"👗 Roupas & Acessórios",color:"#A855F7"},
  {name:"📚 Educação",color:"#3B82F6"},{name:"🎉 Lazer & Entretenimento",color:"#F59E0B"},
  {name:"🐾 Pet",color:"#14B8A6"},{name:"✈️ Viagens",color:"#06B6D4"},
  {name:"💳 Assinaturas",color:"#8B5CF6"},{name:"🛍️ Compras Online",color:"#EF4444"},

const CAT_NAMES = CATEGORIES.map(c=>c.name);

const PAYMENTS = ["💳 Crédito","💳 Débito","💵 Dinheiro","📱 Pix","🏦 Transferência"];
const INVEST_TYPES = [
  {name:"🏦 Tesouro Direto",color:"#0EA5E9"},{name:"📈 Renda Fixa",color:"#10B981"},
  {name:"📊 Ações",color:"#6366F1"},{name:"🏢 FIIs",color:"#A855F7"},
  {name:"🌎 ETF / Exterior",color:"#06B6D4"},{name:"₿ Cripto",color:"#F59E0B"},
  {name:"💰 Poupança",color:"#14B8A6"},{name:"🛡️ Reserva de Emergência",color:"#64748B"},
  {name:"📦 Outros",color:"#94A3B8"},
];
const IV_NAMES = INVEST_TYPES.map(t=>t.name);
const IV_COLOR = Object.fromEntries(INVEST_TYPES.map(t=>[t.name,t.color]));

/* ============================== Helpers ============================== */
const brl = n => (Number(n)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
function parseNum(s){
  if(s==null) return 0;
  s = String(s).trim().replace(/\s/g,"").replace(/r\$/gi,"");
  if(!s) return 0;
  const hasComma = s.includes(","), hasDot = s.includes(".");
  if(hasComma && hasDot){
    s = s.lastIndexOf(",") > s.lastIndexOf(".")
      ? s.replace(/\./g,"").replace(",",".")
      : s.replace(/,/g,"");
  } else if(hasComma){
    s = s.replace(",",".");
  }
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
const uid = () => (window.crypto && crypto.randomUUID)
  ? crypto.randomUUID()
  : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,c=>{
      const r=Math.random()*16|0, v=c==="x"?r:(r&0x3|0x8); return v.toString(16);
    });
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const $ = id => document.getElementById(id);
const incomeKey = (y,m) => y+"-"+m;
function instHits(i,y,m){
  if(!(i.count>0)) return false;
  const start = i.startYear*12 + i.startMonth;
  const cur = y*12 + m;
  return start<=cur && cur<=start+i.count-1;
}
function instTouchesYear(i,y){
  if(!(i.count>0)) return false;
  const start = i.startYear*12 + i.startMonth, end = start+i.count-1;
  return start <= y*12+11 && end >= y*12;
}

let state = {expenses:[], installments:[], income:{}, investments:[]};
let view="mes", curYear=2026, curMonth=5, editingId=null, editingInvId=null;

/* ============================== Camada de dados (Supabase) ==============================
   UI otimista: muda o state local na hora, grava no banco em seguida.
   Se a gravação falhar, avisa e recarrega do servidor.
*/
function expIn(r){ return {id:r.id, year:r.year, month:r.month, date:r.date, description:r.description,
  value:Number(r.value), category:r.category, payment:r.payment, paid:!!r.paid}; }
function expOut(e){ return {id:e.id, user_id:currentUser.id, year:e.year, month:e.month, date:e.date||null,
  description:e.description, value:e.value, category:e.category, payment:e.payment, paid:!!e.paid}; }
function instIn(r){ return {id:r.id, description:r.description, total:Number(r.total), category:r.category,
  payment:r.payment, count:r.count, startMonth:r.start_month, startYear:r.start_year, paid:!!r.paid}; }
function instOut(i){ return {id:i.id, user_id:currentUser.id, description:i.description, total:i.total,
  category:i.category, payment:i.payment, count:i.count, start_month:i.startMonth, start_year:i.startYear, paid:!!i.paid}; }
function invIn(r){ return {id:r.id, year:r.year, month:r.month, date:r.date, description:r.description,
  value:Number(r.value), type:r.type, kind:r.kind}; }
function invOut(v){ return {id:v.id, user_id:currentUser.id, year:v.year, month:v.month, date:v.date||null,
  description:v.description, value:v.value, type:v.type, kind:v.kind}; }

function dbErr(e){ console.error(e); alert("Não consegui salvar no servidor:\n"+(e.message||e)+"\nVou recarregar seus dados."); }
async function reloadAndRender(){ await loadFromCloud(); render(); }

async function loadFromCloud(){
  const [ex, ins, inc, inv] = await Promise.all([
    sb.from("expenses").select("*").order("created_at",{ascending:false}),
    sb.from("installments").select("*").order("created_at",{ascending:false}),
    sb.from("income").select("*"),
    sb.from("investments").select("*").order("created_at",{ascending:false}),
  ]);
  for(const r of [ex,ins,inc,inv]) if(r.error) throw r.error;
  state = {expenses:[], installments:[], income:{}, investments:[]};
  (ex.data ||[]).forEach(r=>state.expenses.push(expIn(r)));
  (ins.data||[]).forEach(r=>state.installments.push(instIn(r)));
  (inc.data||[]).forEach(r=>{ state.income[incomeKey(r.year,r.month)] = Number(r.amount); });
  (inv.data||[]).forEach(r=>state.investments.push(invIn(r)));
}

async function dbInsert(table, row){ const {error}=await sb.from(table).insert(row); if(error){ dbErr(error); await reloadAndRender(); } }
async function dbUpdate(table, id, patch){ const {error}=await sb.from(table).update(patch).eq("id",id); if(error){ dbErr(error); await reloadAndRender(); } }
async function dbDelete(table, id){ const {error}=await sb.from(table).delete().eq("id",id); if(error){ dbErr(error); await reloadAndRender(); } }
async function dbUpsertIncome(y,m,amount){
  const {error}=await sb.from("income").upsert(
    {user_id:currentUser.id, year:y, month:m, amount},
    {onConflict:"user_id,year,month"});
  if(error){ dbErr(error); await reloadAndRender(); }
}

/* ============================== Cálculos ============================== */
function monthExpenses(y,m){ return state.expenses.filter(e=>e.year===y && e.month===m); }
function subtotalOf(y,m){ return monthExpenses(y,m).reduce((s,e)=>s+(Number(e.value)||0),0); }
function parcelasOf(y,m){
  return state.installments.filter(i=>instHits(i,y,m)).reduce((s,i)=>s+i.total/i.count,0);
}
function byCategory(y,m){
  const map={};
  monthExpenses(y,m).forEach(e=>{ map[e.category]=(map[e.category]||0)+(Number(e.value)||0); });
  return CAT_NAMES.map(n=>({name:n,total:map[n]||0})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
}

function renderList(){
  const items = monthExpenses(curYear,curMonth);
  if(items.length===0){
    $("listRoot").innerHTML = `<div class="empty">Nenhum lançamento neste mês.<br>Adicione o primeiro acima.</div>`;
    return;
  }
  let html = `<div class="list-count">${items.length} lançamento${items.length>1?"s":""}</div>`;
  items.forEach(e=>{ html += (e.id===editingId ? editRow() : displayRow(e)); });
  $("listRoot").innerHTML = html;

  $("listRoot").querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>{
    const e=state.expenses.find(x=>x.id===b.dataset.toggle); if(e){ e.paid=!e.paid; refreshMonth(); dbUpdate("expenses",e.id,{paid:e.paid}); }
  });
  $("listRoot").querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    if(confirm("Excluir este lançamento?")){ const id=b.dataset.del; state.expenses=state.expenses.filter(x=>x.id!==id); refreshMonth(); dbDelete("expenses",id); }
  });
  $("listRoot").querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{ editingId=b.dataset.edit; renderList(); });

  if(editingId){
    const e=state.expenses.find(x=>x.id===editingId);
    if(e){
      $("e_date").value = e.date || `${curYear}-${String(curMonth+1).padStart(2,"0")}-01`;
      $("e_value").value = String(e.value).replace(".",",");
      $("e_desc").value = e.description;
      $("e_cat").value = e.category;
      $("e_pay").value = e.payment;
      $("e_paid").value = e.paid ? "Pago" : "A pagar";
      $("e_save").onclick=()=>{
        const v=parseNum($("e_value").value), d=$("e_desc").value.trim();
        if(!d || !(v>0)){ return; }
        e.date=$("e_date").value; e.value=v; e.description=d;
        e.category=$("e_cat").value; e.payment=$("e_pay").value; e.paid=($("e_paid").value==="Pago");
        editingId=null; refreshMonth();
        dbUpdate("expenses",e.id,{date:e.date,value:e.value,description:e.description,category:e.category,payment:e.payment,paid:e.paid});
      };
      $("e_cancel").onclick=()=>{ editingId=null; renderList(); };
    }
  }
}

function renderBreakdown(){
  const cats = byCategory(curYear,curMonth);
  const sub = subtotalOf(curYear,curMonth);
  if(cats.length===0){ $("breakdownRoot").innerHTML=`<div class="empty">Sem gastos ainda.</div>`; return; }
  let acc=0; const stops=[];
  cats.forEach(c=>{ const pct=sub>0?(c.total/sub)*100:0; stops.push(`${CAT_COLOR[c.name]} ${acc}% ${acc+pct}%`); acc+=pct; });
  const donut=`<div class="donut-wrap"><div class="donut" style="background:conic-gradient(${stops.join(",")})"></div></div>`;
  const rows=cats.map(c=>{
    const pct=sub>0?(c.total/sub)*100:0;
    return `<div class="catrow">
      <div class="top"><span class="nm">${esc(c.name)}</span><span class="vl num">${brl(c.total)} · ${pct.toFixed(0)}%</span></div>
      <div class="track"><div style="width:${pct}%; background:${CAT_COLOR[c.name]}"></div></div>
    </div>`;
  }).join("");
  $("breakdownRoot").innerHTML = donut+rows+`<div class="subtotal"><span>Subtotal lançamentos</span><span class="num">${brl(sub)}</span></div>`;
}

function addExpense(){
  const desc=$("f_desc").value.trim(), val=parseNum($("f_value").value);
  if(!desc || !(val>0)) return;
  const e={ id:uid(), year:curYear, month:curMonth, date:$("f_date").value,
    description:desc, value:val, category:$("f_cat").value, payment:$("f_pay").value, paid:false };
  state.expenses.unshift(e);
  $("f_desc").value=""; $("f_value").value=""; refreshMonth(); $("f_desc").focus();
  dbInsert("expenses", expOut(e));
}

function renderInstList(){
  const y=curYear;
  $("instYear").textContent = y;
  const now=new Date(); const nowAbs = now.getFullYear()*12 + now.getMonth();
  const list = state.installments.filter(i=>instTouchesYear(i,y));
  if(list.length===0){
    $("instRoot").innerHTML=`<div class="empty">Nenhum parcelamento em ${y}.<br>Use ◀ ▶ para ver outros anos.</div>`;
    return;
  }
  const rows = list.map(i=>{
    const start=i.startYear*12+i.startMonth, end=start+i.count-1;
    let status,cls;
    if(end<nowAbs){ status="Encerrada"; cls="done"; }
    else if(start>nowAbs){ status="A iniciar"; cls="soon"; }
    else { status="Em andamento"; cls="on"; }
    const ey=Math.floor(end/12), em=end%12;
    return {i,start,cls,status,ey,em};
  }).sort((a,b)=> (a.cls==="done")-(b.cls==="done") || b.start-a.start);

  $("instRoot").innerHTML = rows.map(o=>{
    const i=o.i;
    return `<div class="item ${o.cls==="done"?"done-inst":""}">
      <span style="font-size:19px;flex:0 0 auto">💳</span>
      <div class="info">
        <div class="desc2">${esc(i.description)} <span class="pill ${o.cls}">${o.status}</span></div>
        <div class="meta2">${esc(i.category)} · ${i.count}x de ${brl(i.total/i.count)}</div>
        <div class="meta2">${MONTHS[i.startMonth]}/${i.startYear} → ${MONTHS[o.em]}/${o.ey}</div>
      </div>
      <span class="amt num">${brl(i.total)}</span>
      <button class="iconbtn del" data-delinst="${i.id}">🗑</button>
    </div>`;
  }).join("");

  $("instRoot").querySelectorAll("[data-delinst]").forEach(b=>b.onclick=()=>{
    if(confirm("Excluir este parcelamento? Ele some de todos os anos.")){ const id=b.dataset.delinst; state.installments=state.installments.filter(x=>x.id!==id); renderInstList(); dbDelete("installments",id); }
  });
}

function addInst(){
  const desc=$("p_desc").value.trim(), total=parseNum($("p_total").value), count=parseNum($("p_count").value);
  const sm=Number($("p_start").value), sy=parseInt($("p_year").value,10)||curYear;
  if(!desc || !(total>0) || !(count>0)) return;
  const i={ id:uid(), description:desc, total, category:$("p_cat").value, payment:$("p_pay").value,
    count, startMonth:sm, startYear:sy, paid:false };
  state.installments.unshift(i);
  $("p_desc").value=""; $("p_total").value=""; $("p_count").value=""; $("p_preview").textContent="";
  renderInstList();
  dbInsert("installments", instOut(i));
}

/* ---------- Anual ---------- */
function renderAnual(){
  const y=curYear;
  const matrix={}; CAT_NAMES.forEach(c=>matrix[c]=Array(12).fill(0));
  state.expenses.filter(e=>e.year===y).forEach(e=>{ if(matrix[e.category]) matrix[e.category][e.month]+=Number(e.value)||0; });
  const subM=Array(12).fill(0); CAT_NAMES.forEach(c=>{ for(let i=0;i<12;i++) subM[i]+=matrix[c][i]; });
  const parcM=Array(12).fill(0);
  for(let m=0;m<12;m++) state.installments.forEach(i=>{ if(instHits(i,y,m)) parcM[m]+=i.total/i.count; });
  const totM=subM.map((s,i)=>s+parcM[i]);
  const rendaM=Array.from({length:12},(_,i)=>Number(state.income[incomeKey(y,i)]||0));
  const saldoM=totM.map((t,i)=>rendaM[i]-t);
  const sum=a=>a.reduce((x,z)=>x+z,0);
  const cell=(v,cls="")=>`<td class="r ${v?"":"z"} ${cls}">${v?brl(v):"–"}</td>`;

  const bodyRows=CAT_NAMES.map(c=>{
    const tot=sum(matrix[c]); if(tot===0) return "";
    return `<tr><td class="l">${esc(c)}</td>${matrix[c].map(v=>cell(v)).join("")}<td class="r" style="font-weight:700;color:#1f2430">${brl(tot)}</td></tr>`;
  }).join("");
  const saldoCells=saldoM.map(v=>{
    const cls=v===0?"z":(v>0?"green":"rose");
    return `<td class="r ${cls}" style="font-weight:700">${v===0?"–":brl(v)}</td>`;
  }).join("");

  $("viewRoot").innerHTML = `
    <div class="ynav">
      <button id="aPrevY">◀</button><h2 id="aYearLabel">${y}</h2><button id="aNextY">▶</button>
    </div>
    <div class="card" style="padding:0; overflow:hidden">
      <h3 class="card-h" style="padding:14px 14px 0; margin:0">📊 Resumo Anual — ${y}</h3>
      <div class="scroll" style="margin-top:10px">
        <table>
          <thead><tr><th class="l">Categoria</th>${MONTHS.map(m=>`<th class="r">${m.slice(0,3)}</th>`).join("")}<th class="r">Total</th></tr></thead>
          <tbody>${bodyRows||`<tr><td class="l" colspan="14" style="color:#94a3b8;padding:18px">Sem lançamentos em ${y}.</td></tr>`}</tbody>
          <tfoot>
            <tr><td class="l">💳 Parcelas</td>${parcM.map(v=>cell(v)).join("")}${cell(sum(parcM))}</tr>
            <tr class="tot-row"><td class="l">📌 Total</td>${totM.map(v=>cell(v)).join("")}${cell(sum(totM))}</tr>
            <tr><td class="l" style="color:#059669">💵 Renda</td>${rendaM.map(v=>`<td class="r ${v?"green":"z"}">${v?brl(v):"–"}</td>`).join("")}<td class="r green" style="font-weight:700">${brl(sum(rendaM))}</td></tr>
            <tr><td class="l">📊 Saldo</td>${saldoCells}<td class="r ${sum(saldoM)>=0?"green":"rose"}" style="font-weight:800">${brl(sum(saldoM))}</td></tr>
          </tfoot>
        </table>
      </div>
    </div>
    <p class="footnote">Role a tabela para os lados para ver todos os meses.</p>
  `;
  $("aPrevY").onclick=()=>{ curYear--; renderAnual(); };
  $("aNextY").onclick=()=>{ curYear++; renderAnual(); };
}

/* ============================== Investimentos ============================== */
function investMonth(y,m){ return state.investments.filter(i=>i.year===y && i.month===m); }
function signed(i){ return (i.kind==="resgate"? -1:1) * (Number(i.value)||0); }
function investNetMonth(y,m){ return investMonth(y,m).reduce((s,i)=>s+signed(i),0); }
function investNetYear(y){ return state.investments.filter(i=>i.year===y).reduce((s,i)=>s+signed(i),0); }
function investNetTotal(){ return state.investments.reduce((s,i)=>s+signed(i),0); }
function investByType(y,m){
  const map={};
  investMonth(y,m).forEach(i=>{ map[i.type]=(map[i.type]||0)+signed(i); });
  return IV_NAMES.map(n=>({name:n,total:map[n]||0})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
}

  $("iv_date").value = `${curYear}-${mm}-01`;
  const mes = investNetMonth(curYear,curMonth);
  const ano = investNetYear(curYear);
  const tot = investNetTotal();
  $("ivStatsRoot").innerHTML = `
    <div class="stats">
      <div class="stat"><div class="lbl">📈 Investido no mês</div><div class="val invest num">${brl(mes)}</div></div>
      <div class="stat"><div class="lbl">📅 Investido no ano</div><div class="val invest num">${brl(ano)}</div></div>
      <div class="stat" style="grid-column:1 / -1"><div class="lbl">💼 Acumulado total (todos os anos)</div><div class="val invest num">${brl(tot)}</div></div>
    </div>`;
  renderInvList();
  renderInvBreak();
}

function invDisplayRow(i){
  const v = signed(i);
  return `<div class="item">
    <span class="bar" style="background:${IV_COLOR[i.type]||"#94a3b8"}"></span>
    <div class="info">
      <div class="desc">${esc(i.description)}</div>
      <div class="meta">${esc(i.type)} · ${i.kind==="resgate"?"Resgate":"Aporte"}</div>
    </div>
    <span class="amt num ${v>=0?"invest":"rose"}">${v>=0?"":"−"}${brl(Math.abs(v))}</span>
    <button class="iconbtn edit" data-edit="${i.id}">✎</button>
    <button class="iconbtn del" data-del="${i.id}">🗑</button>
  </div>`;
}
function invEditRow(){
  return `<div class="editbox">
    <div class="form-grid">
      <input type="date" id="ie_date">
      <input type="text" inputmode="decimal" id="ie_value" placeholder="Valor R$">
      <input class="full" id="ie_desc" placeholder="Descrição">
      <select id="ie_type">${IV_NAMES.map(t=>`<option>${t}</option>`).join("")}</select>
      <select id="ie_kind"><option>Aporte</option><option>Resgate</option></select>
      <button class="btn" id="ie_save">Salvar</button>
      <button class="btn-ghost" id="ie_cancel">Cancelar</button>
    </div>
  </div>`;
}
function renderInvList(){
  const items = investMonth(curYear,curMonth);
  if(items.length===0){
    $("ivListRoot").innerHTML = `<div class="empty">Nenhum investimento neste mês.<br>Adicione o primeiro acima.</div>`;
    return;
  }
  let html = `<div class="list-count">${items.length} lançamento${items.length>1?"s":""}</div>`;
  items.forEach(i=>{ html += (i.id===editingInvId ? invEditRow() : invDisplayRow(i)); });
  $("ivListRoot").innerHTML = html;

  $("ivListRoot").querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    if(confirm("Excluir este investimento?")){ const id=b.dataset.del; state.investments=state.investments.filter(x=>x.id!==id); refreshInvest(); dbDelete("investments",id); }
  });
  $("ivListRoot").querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{ editingInvId=b.dataset.edit; renderInvList(); });

  if(editingInvId){
    const i=state.investments.find(x=>x.id===editingInvId);
    if(i){
      $("ie_date").value = i.date || `${curYear}-${String(curMonth+1).padStart(2,"0")}-01`;
      $("ie_value").value = String(i.value).replace(".",",");
      $("ie_desc").value = i.description;
      $("ie_type").value = i.type;
      $("ie_kind").value = i.kind==="resgate" ? "Resgate" : "Aporte";
      $("ie_save").onclick=()=>{
        const v=parseNum($("ie_value").value), d=$("ie_desc").value.trim();
        if(!d || !(v>0)) return;
        i.date=$("ie_date").value; i.value=v; i.description=d; i.type=$("ie_type").value;
        i.kind=($("ie_kind").value==="Resgate"?"resgate":"aporte");
        editingInvId=null; refreshInvest();
        dbUpdate("investments",i.id,{date:i.date,value:i.value,description:i.description,type:i.type,kind:i.kind});
      };
      $("ie_cancel").onclick=()=>{ editingInvId=null; renderInvList(); };
    }
  }
}
function renderInvBreak(){
  const types = investByType(curYear,curMonth);
  const sub = types.reduce((s,t)=>s+t.total,0);
  if(types.length===0){ $("ivBreakRoot").innerHTML=`<div class="empty">Sem aportes neste mês.</div>`; return; }
  let acc=0; const stops=[];
  types.forEach(t=>{ const pct=sub>0?(t.total/sub)*100:0; stops.push(`${IV_COLOR[t.name]} ${acc}% ${acc+pct}%`); acc+=pct; });
  const donut=`<div class="donut-wrap"><div class="donut" style="background:conic-gradient(${stops.join(",")})"></div></div>`;
  const rows=types.map(t=>{
    const pct=sub>0?(t.total/sub)*100:0;
    return `<div class="catrow">
      <div class="top"><span class="nm">${esc(t.name)}</span><span class="vl num">${brl(t.total)} · ${pct.toFixed(0)}%</span></div>
      <div class="track"><div style="width:${pct}%; background:${IV_COLOR[t.name]}"></div></div>
    </div>`;
  }).join("");
  $("ivBreakRoot").innerHTML = donut+rows+`<div class="subtotal"><span>Investido no mês</span><span class="num">${brl(sub)}</span></div>`;
}
function addInvest(){
  const desc=$("iv_desc").value.trim(), val=parseNum($("iv_value").value);
  if(!desc || !(val>0)) return;
  const i={ id:uid(), year:curYear, month:curMonth, date:$("iv_date").value,
    description:desc, value:val, type:$("iv_type").value,
    kind:($("iv_kind").value==="Resgate"?"resgate":"aporte") };
  state.investments.unshift(i);
  $("iv_desc").value=""; $("iv_value").value=""; refreshInvest(); $("iv_desc").focus();
  dbInsert("investments", invOut(i));
}

    ["faculdade",1000,"📚 Educação","📱 Pix",false],
    ["aluguel",1500,"🏠 Moradia","🏦 Transferência",true],
  ];
  const exRows = exemplo.map(r=>({ id:uid(), user_id:currentUser.id, year:y, month:m,
    date:`2026-06-10`, description:r[0], value:r[1], category:r[2], payment:r[3], paid:r[4] }));
  const invRows = [{ id:uid(), user_id:currentUser.id, year:y, month:m, date:"2026-06-05",

/* ============================== Autenticação ============================== */
let authMode = "login"; /* login | signup | forgot | otp | newpass */
let forgotEmail = "";

function maskEmail(e){ const [u,d]=e.split("@"); return u.slice(0,2)+"***@"+d; }

function renderAuthCard(){
  const card=$("authCard"); if(!card) return;
  let html=`<h1>💰 Controle de Gastos</h1>`;
  if(authMode==="login"){
    html+=`
      <p class="sub">Entre para acessar suas finanças.</p>
      <input type="email" id="au_email" placeholder="E-mail" autocomplete="email">
      <input type="password" id="au_pass" placeholder="Senha (mín. 6 caracteres)" autocomplete="current-password">
      <button class="btn" id="au_primary">Entrar</button>
      <p class="auth-msg" id="au_msg"></p>
      <p class="auth-switch">Não tem conta? <a href="#" id="au_toggle">Criar conta</a></p>
      <a href="#" class="auth-forgot" id="au_forgot">Esqueci minha senha</a>`;
  } else if(authMode==="signup"){
    html+=`
      <p class="sub">Crie sua conta para começar.</p>
      <input type="email" id="au_email" placeholder="E-mail" autocomplete="email">
      <input type="password" id="au_pass" placeholder="Senha (mín. 6 caracteres)" autocomplete="new-password">
      <button class="btn" id="au_primary">Criar conta</button>
      <p class="auth-msg" id="au_msg"></p>
      <p class="auth-switch">Já tem conta? <a href="#" id="au_toggle">Entrar</a></p>`;
  } else if(authMode==="forgot"){
    html+=`
      <p class="sub">Informe seu e-mail para receber o link de recuperação.</p>
      <input type="email" id="au_email" placeholder="E-mail cadastrado" autocomplete="email">
      <button class="btn" id="au_primary">Enviar link</button>
      <p class="auth-msg" id="au_msg"></p>
      <a href="#" class="auth-forgot" id="au_back">← Voltar para o login</a>`;
  } else if(authMode==="forgot_sent"){
    html+=`
      <p class="sub">Link enviado!</p>
      <p style="font-size:13px;color:var(--muted);margin:-10px 0 18px;line-height:1.6;">Verifique a caixa de entrada de <b>${esc(forgotEmail)}</b> e também o spam.<br>Clique no link do e-mail — ele vai abrir este app direto na tela de nova senha.</p>
      <button class="btn" id="au_primary">Reenviar link</button>
      <p class="auth-msg" id="au_msg"></p>
      <a href="#" class="auth-forgot" id="au_back">← Voltar para o login</a>`;
  } else if(authMode==="newpass"){
    html+=`
      <p class="sub">Defina sua nova senha.</p>
      <input type="password" id="au_pass1" placeholder="Nova senha (mín. 6 caracteres)" autocomplete="new-password">
      <input type="password" id="au_pass2" placeholder="Confirmar nova senha" autocomplete="new-password">
      <button class="btn" id="au_primary">Salvar nova senha</button>
      <p class="auth-msg" id="au_msg"></p>`;
  }
  card.innerHTML=html;

  const btn=$("au_primary");
  if(btn){
    if(authMode==="login"||authMode==="signup") btn.onclick=doAuth;
    else if(authMode==="forgot") btn.onclick=doForgot;
    else if(authMode==="forgot_sent") btn.onclick=()=>doForgot(true);
    else if(authMode==="newpass") btn.onclick=doSetNewPass;
  }
  if($("au_toggle")) $("au_toggle").onclick=e=>{ e.preventDefault(); setAuthMode(authMode==="login"?"signup":"login"); };
  if($("au_forgot")) $("au_forgot").onclick=e=>{ e.preventDefault(); setAuthMode("forgot"); };
  if($("au_back"))   $("au_back").onclick=e=>{ e.preventDefault(); setAuthMode("login"); };
  if($("au_resend")) $("au_resend").onclick=e=>{ e.preventDefault(); doForgot(true); };
  if($("au_pass"))  $("au_pass").addEventListener("keydown",e=>{ if(e.key==="Enter") doAuth(); });
  if($("au_otp"))   $("au_otp").addEventListener("keydown",e=>{ if(e.key==="Enter") doVerifyOtp(); });
  if($("au_pass2")) $("au_pass2").addEventListener("keydown",e=>{ if(e.key==="Enter") doSetNewPass(); });
}

function setAuthMode(mode){ authMode=mode; renderAuthCard(); }
function showAuth(){ $("app").classList.add("hidden"); $("authScreen").classList.remove("hidden"); setAuthMode("login"); }
function showApp(){ $("authScreen").classList.add("hidden"); $("app").classList.remove("hidden"); }
function authMsg(txt,kind){ const el=$("au_msg"); if(el){ el.textContent=txt||""; el.className="auth-msg"+(kind?" "+kind:""); } }

async function doAuth(){
  const email=$("au_email").value.trim(), pass=$("au_pass").value;
  if(!email||pass.length<6){ authMsg("Informe e-mail e senha (mín. 6 caracteres).","err"); return; }
  $("au_primary").disabled=true; authMsg("Processando...");
  try{
    if(authMode==="login"){
      const {error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error) throw error;
    } else {
      const {data,error}=await sb.auth.signUp({email,password:pass,options:{emailRedirectTo:window.location.href}});
      if(error) throw error;
      if(data.user&&!data.session){ authMsg("Conta criada! Confirme o e-mail e depois entre.","ok"); $("au_primary").disabled=false; setAuthMode("login"); return; }
    }
  }catch(err){ authMsg(traduzErroAuth(err.message),"err"); $("au_primary").disabled=false; return; }
  $("au_primary").disabled=false;
}

async function doForgot(resend=false){
  const emailInput=$("au_email");
  const email=(resend===true)?forgotEmail:(emailInput?emailInput.value.trim():"");
  if(!email){ authMsg("Informe seu e-mail.","err"); return; }
  const btn=$("au_primary"); if(btn) btn.disabled=true;
  authMsg("Enviando link...");
  if(window.location.protocol!=="https:"){
    if(btn) btn.disabled=false;
    authMsg("Para usar a recuperação de senha, abra o app pelo link do Netlify, não pelo arquivo local.","err");
    return;
  }
  const {error}=await sb.auth.resetPasswordForEmail(email);
  if(error){
    if(btn) btn.disabled=false;
    const msg=(error.message||"").toLowerCase();
    if(error.status===429||msg.includes("security purposes")){
      authMsg("Aguarde alguns segundos antes de tentar novamente.","err");
    } else {
      authMsg("Erro: "+(error.message||"tente novamente em instantes."),"err");
    }
    return;
  }
  forgotEmail=email;
  if(authMode!=="forgot_sent"){ setAuthMode("forgot_sent"); }
  else{ if(btn) btn.disabled=false; authMsg("Link reenviado!","ok"); }
}

async function doSetNewPass(){
  const p1=$("au_pass1").value, p2=$("au_pass2").value;
  if(p1.length<6){ authMsg("A senha precisa ter no mínimo 6 caracteres.","err"); return; }
  if(p1!==p2){ authMsg("As senhas não coincidem.","err"); return; }
  $("au_primary").disabled=true; authMsg("Salvando...");
  const {error}=await sb.auth.updateUser({password:p1});
  if(error){ authMsg("Erro ao salvar: "+error.message,"err"); $("au_primary").disabled=false; return; }
  authMsg("Senha alterada com sucesso! Entrando...","ok");
  forgotEmail=""; authMode="login";
  setTimeout(async()=>{
    const {data:{session}}=await sb.auth.getSession();
    if(session&&session.user) startApp(session.user); else setAuthMode("login");
  },1200);
}

function traduzErroAuth(m){
  m=(m||"").toLowerCase();
  if(m.includes("invalid login")) return "E-mail ou senha incorretos.";
  if(m.includes("already registered")) return "Este e-mail já tem conta. Tente entrar.";
  if(m.includes("password")) return "Senha inválida (mín. 6 caracteres).";
  return "Erro: "+m;
}

async function startApp(user){
  currentUser = user;
  loadUserTheme();
  showApp();
  try{
    await loadFromCloud();
    render();
  }catch(err){
    $("viewRoot").innerHTML='<div class="empty">Não consegui carregar seus dados.<br><span style="font-size:11px;color:#cbd2dd">'+esc(err.message||String(err))+'</span></div>';
  }
}

/* ============================== Temas ============================== */
const THEMES = [
  {key:"mono",   name:"Padrão",  dot:"#111111", vars:{"--violet":"#111111","--violet-dark":"#000000","--violet-soft":"#f2f2f2","--ink":"#111111","--muted":"#6b7280","--faint":"#9ca3af","--bg":"#f5f5f5","--line":"#e5e7eb"}},
  {key:"rosa",   name:"Rosa",    dot:"#d6568a", vars:{"--violet":"#d6568a","--violet-dark":"#bf477a","--violet-soft":"#fbe7f0","--ink":"#3a2b33","--muted":"#7a6b73","--faint":"#b09aa4","--bg":"#f1f0f2","--line":"#ecdfe6"}},
  {key:"azul",   name:"Azul",    dot:"#2563eb", vars:{"--violet":"#2563eb","--violet-dark":"#1d4ed8","--violet-soft":"#eff6ff","--ink":"#1e3a5f","--muted":"#64748b","--faint":"#94a3b8","--bg":"#f0f4ff","--line":"#dbeafe"}},
  {key:"verde",  name:"Verde",   dot:"#059669", vars:{"--violet":"#059669","--violet-dark":"#047857","--violet-soft":"#ecfdf5","--ink":"#064e3b","--muted":"#6b7280","--faint":"#9ca3af","--bg":"#f0fdf4","--line":"#d1fae5"}},
];

function applyTheme(key){
  const t=THEMES.find(t=>t.key===key)||THEMES[0];
  currentThemeKey=t.key;
  const root=document.documentElement;
  Object.entries(t.vars).forEach(([k,v])=>root.style.setProperty(k,v));
  document.body.style.background=t.vars["--bg"];
  const meta=document.getElementById("metaThemeColor");
  if(meta) meta.content=t.vars["--bg"];
}

function loadUserTheme(){
  if(!currentUser) return;
  const key=localStorage.getItem("theme_"+currentUser.id)||"mono";
  applyTheme(key);
}

function renderThemeGrid(){
  const grid=$("themeGrid"); if(!grid) return;
  grid.innerHTML=THEMES.map(t=>`
    <button class="theme-swatch${t.key===currentThemeKey?" active":""}" data-theme="${t.key}">
      <div class="dot" style="background:${t.dot};"></div>
      ${t.name}
    </button>`).join("");
  grid.querySelectorAll(".theme-swatch").forEach(btn=>{
    btn.onclick=()=>{
      const key=btn.dataset.theme;
      if(currentUser) localStorage.setItem("theme_"+currentUser.id, key);
      applyTheme(key);
      renderThemeGrid();
    };
  });
}

function openSettings(){
  $("settingsPanel").classList.remove("hidden");
  renderThemeGrid();
}

function closeSettings(){
  $("settingsPanel").classList.add("hidden");
}

/* ============================== Boot ============================== */
document.querySelectorAll("nav.tabs button").forEach(b=>{
  b.onclick=()=>{ view=b.dataset.view; render(); window.scrollTo(0,0); };
});
$("settingsBtn").onclick=openSettings;
$("settingsPanel").onclick=e=>{ if(e.target===$("settingsPanel")) closeSettings(); };
$("logoutBtn").onclick=async()=>{ closeSettings(); await sb.auth.signOut(); };
setAuthMode("login");

sb.auth.onAuthStateChange((event, session)=>{
  if(event==="PASSWORD_RECOVERY"){
    $("app").classList.add("hidden");
    $("authScreen").classList.remove("hidden");
    setAuthMode("newpass");
    return;
  }
  if(session && session.user){
    if(authMode==="newpass") return;
    if(!currentUser || currentUser.id!==session.user.id) startApp(session.user);
  } else {
    currentUser=null; applyTheme("mono"); showAuth();
  }
});

(async ()=>{
  const { data:{ session } } = await sb.auth.getSession();
  if(session && session.user) startApp(session.user);
  else showAuth();
})();
</script>
